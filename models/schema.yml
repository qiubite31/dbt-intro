version: 2                           # dbt 綱要版本

sources:                              # 資料來源定義
  - name: my_sqlite_source           # 來源名稱，供 {{ source() }} 引用
    schema: main                     # SQLite 中的 schema 名稱
    tables:                          # 來源資料表
      - name: raw_customers          # 原始客戶資料表
      - name: raw_orders             # 原始訂單資料表

models:                               # 模型定義與測試
  - name: stg_customers              # 客戶中台模型
    columns:                         # 欄位測試
      - name: customer_id            # 客戶 ID
        tests:                       # 測試項目
          - unique                   # 確保唯一性
          - not_null                 # 確保非空值

  - name: stg_orders                 # 訂單中台模型
    columns:
      - name: order_id               # 訂單 ID
        tests:
          - unique                   # 確保唯一性
          - not_null                 # 確保非空值
      - name: status                 # 訂單狀態
        tests:
          - accepted_values:         # 驗證是否在允許的數值清單內
              values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']

  - name: customers_with_orders      # 客戶訂單關聯模型（最終輸出）
    columns:
      - name: customer_id            # 客戶 ID
        tests:
          - unique                   # 確保唯一性
          - not_null                 # 確保非空值

  - name: customer_order_detail      # 客戶訂單明細模型
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
